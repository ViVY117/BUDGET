<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="บัญชีฉัน">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000'/><text y='62' x='50' text-anchor='middle' font-size='42' fill='white' font-family='serif'>₿</text></svg>">
<title>BUDGET</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#fafafa;--bg2:#f2f2f2;--bg3:#e8e8e8;
  --text:#0a0a0a;--muted:#999;--border:#e0e0e0;
  --ink:#0a0a0a;--paper:#fafafa;
  --green:#1d7a52;--red:#b83232;
  --serif:'DM Serif Display',serif;
  --sans:'DM Sans',sans-serif;
}
[data-theme="dark"]{
  --bg:#080808;--bg2:#111;--bg3:#1c1c1c;
  --text:#f5f5f5;--muted:#555;--border:#222;
  --ink:#f5f5f5;--paper:#080808;
  --green:#34c985;--red:#e05c5c;
}

html,body{height:100%;}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;min-height:100vh;
  padding-bottom:80px;transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
.hdr{
  padding:20px 24px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;
  position:sticky;top:0;z-index:30;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.hdr-brand{display:flex;flex-direction:column;gap:1px;}
.hdr-name{font-family:var(--serif);font-size:22px;letter-spacing:-0.5px;line-height:1;}
.hdr-sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.hdr-controls{display:flex;align-items:center;gap:8px;margin-top:4px;}
.icon-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:none;
  color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.icon-btn:active{background:var(--bg2);}
.month-lbl{font-size:12px;font-weight:500;min-width:64px;text-align:center;letter-spacing:0.5px;}

/* ── BALANCE HERO ── */
.hero{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.hero-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hero-balance{font-family:var(--serif);font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:20px;}
.hero-balance .sign{font-size:28px;vertical-align:middle;margin-right:2px;}
.hero-balance.pos{color:var(--green);}
.hero-balance.neg{color:var(--red);}
.hero-stats{display:flex;gap:0;}
.hstat{flex:1;}
.hstat+.hstat{border-left:1px solid var(--border);padding-left:16px;}
.hstat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.hstat-val{font-size:17px;font-weight:600;letter-spacing:-0.5px;}
.hstat-val.g{color:var(--green);}
.hstat-val.r{color:var(--red);}

/* ── FORM ── */
.form-wrap{padding:20px 24px;border-bottom:1px solid var(--border);}
.type-toggle{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.tpill{
  flex:1;padding:11px;border:none;background:none;
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .15s;
  letter-spacing:0.3px;
}
.tpill.ai{background:var(--ink);color:var(--paper);}
.tpill.ae{background:var(--ink);color:var(--paper);}

.form-row{display:flex;align-items:center;border-bottom:1px solid var(--border);margin-bottom:14px;padding-bottom:12px;}
.form-row-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);min-width:44px;}
.date-inp{
  flex:1;border:none;background:none;
  font-family:var(--sans);font-size:14px;font-weight:500;
  color:var(--text);outline:none;cursor:pointer;
}

.inputs-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.amt-inp,.note-inp{
  border:none;background:none;
  font-family:var(--sans);font-size:15px;
  color:var(--text);outline:none;padding:10px 0;
}
.amt-inp{width:110px;font-weight:600;letter-spacing:-0.3px;}
.amt-inp::placeholder,.note-inp::placeholder{color:var(--muted);font-weight:400;}
.inp-divider{width:1px;background:var(--border);margin:8px 14px;}
.note-inp{flex:1;}

/* ── CHIPS ── */
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:20px;flex-shrink:0;
  border:1px solid var(--border);background:none;
  font-family:var(--sans);font-size:12px;font-weight:500;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .15s;line-height:1.3;
}
.chip.on{border-color:var(--ink);background:var(--ink);color:var(--paper);}

.add-btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  font-family:var(--sans);font-size:14px;font-weight:600;
  background:var(--ink);color:var(--paper);
  cursor:pointer;letter-spacing:0.5px;transition:opacity .15s;
}
.add-btn:active{opacity:0.7;}

/* ── TX LIST ── */
.list-wrap{padding:0 24px;}
.day-group{margin-top:24px;}
.day-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.day-date{font-family:var(--serif);font-size:26px;letter-spacing:-1px;}
.day-meta{font-size:11px;color:var(--muted);letter-spacing:0.5px;}
.day-net{font-size:13px;font-weight:600;letter-spacing:-0.3px;}
.day-net.g{color:var(--green);}
.day-net.r{color:var(--red);}
.tx-items{display:flex;flex-direction:column;}

.tx-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 0;border-bottom:1px solid var(--border);
  transition:opacity .1s;cursor:default;
}
.tx-row:last-child{border-bottom:none;}
.tx-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--muted);
}
.tx-dot.g{background:var(--green);}
.tx-dot.r{background:var(--red);}
.tx-ico{font-size:18px;width:20px;text-align:center;flex-shrink:0;}
.tx-mid{flex:1;min-width:0;}
.tx-note{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.2px;}
.tx-cat{font-size:11px;color:var(--muted);margin-top:1px;letter-spacing:0.3px;}
.tx-right{text-align:right;flex-shrink:0;}
.tx-amt{font-size:15px;font-weight:600;letter-spacing:-0.5px;}
.tx-amt.g{color:var(--green);}
.tx-amt.r{color:var(--red);}
.tx-time{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.3px;}
.tx-del{background:none;border:none;color:var(--border);font-size:12px;cursor:pointer;padding:4px;flex-shrink:0;}
.tx-del:active{color:var(--red);}

/* ── SECTION TITLE ── */
.sec-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:20px 24px 0;}

/* ── WEEKLY ── */
.week-wrap{padding:0 24px;}
.week-block{margin-top:20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.week-hd{padding:14px 18px;background:var(--ink);display:flex;justify-content:space-between;align-items:center;}
.week-hd-lbl{font-size:12px;font-weight:500;color:var(--paper);letter-spacing:0.5px;}
.week-hd-net{font-size:13px;font-weight:700;}
.week-hd-net.g{color:#6ee7b7;}
.week-hd-net.r{color:#fca5a5;}
.week-stats{display:flex;background:var(--bg2);}
.wstat{flex:1;padding:12px 16px;border-right:1px solid var(--border);}
.wstat:last-child{border-right:none;}
.wstat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.wstat-val{font-size:14px;font-weight:600;letter-spacing:-0.3px;}
.wstat-val.g{color:var(--green);}
.wstat-val.r{color:var(--red);}
.week-cats{padding:10px 16px 14px;background:var(--bg2);border-top:1px solid var(--border);}
.wcat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.wcat-name{font-size:12px;color:var(--muted);}
.wcat-amt{font-size:12px;font-weight:500;color:var(--red);}

/* ── MONTHLY ── */
.month-wrap{padding:0 24px;}
.mcard{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:12px;}
.mrow{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-top:1px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.mrow:first-child{border-top:none;}
.mrow:active{background:var(--bg2);}
.mrow.static{cursor:default;}
.mrow.static:active{background:none;}
.mrow-ico{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.mrow-mid{flex:1;min-width:0;}
.mrow-name{font-size:14px;font-weight:500;margin-bottom:4px;letter-spacing:-0.2px;}
.mrow-hint{font-size:10px;color:var(--muted);letter-spacing:0.5px;}
.mrow-bar{height:2px;background:var(--bg3);border-radius:1px;margin-top:6px;}
.mrow-fill{height:2px;border-radius:1px;transition:width .5s;}
.mrow-fill.r{background:var(--red);}
.mrow-fill.g{background:var(--green);}
.mrow-right{text-align:right;flex-shrink:0;}
.mrow-amt{font-size:14px;font-weight:600;letter-spacing:-0.3px;}
.mrow-pct{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.3px;}

/* ── SHARE ── */
.share-wrap{padding:20px 24px;}
.share-block{border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;}
.share-ttl{font-family:var(--serif);font-size:20px;letter-spacing:-0.5px;margin-bottom:4px;}
.share-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.sbtn{
  width:100%;padding:12px 16px;border-radius:10px;
  border:1px solid var(--border);background:none;
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--text);cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;letter-spacing:0.3px;
}
.sbtn:active{background:var(--bg2);}
.sbtn.prime{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.share-out{
  margin-top:12px;background:var(--bg2);border-radius:8px;
  padding:14px;font-size:12px;line-height:1.8;
  white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;display:none;color:var(--text);
  font-family:monospace;
}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none!important;}
.modal{
  background:var(--bg);border-radius:20px 20px 0 0;
  width:100%;max-width:430px;max-height:85vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.modal-hd{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.modal-ttl{font-family:var(--serif);font-size:22px;letter-spacing:-0.5px;}
.modal-hd-r{display:flex;align-items:center;gap:12px;}
.modal-tot{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.modal-tot.g{color:var(--green);}
.modal-tot.r{color:var(--red);}
.modal-x{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border);background:none;
  color:var(--text);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 24px 36px;}
.mday-group{margin-bottom:20px;}
.mday-lbl{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.mitem{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.mitem:last-child{border-bottom:none;}
.mitem-note{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.2px;}
.mitem-r{text-align:right;flex-shrink:0;margin-left:12px;}
.mitem-amt{font-size:14px;font-weight:600;letter-spacing:-0.3px;}
.mitem-amt.g{color:var(--green);}
.mitem-amt.r{color:var(--red);}
.mitem-time{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.3px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:36px;margin-bottom:14px;opacity:0.4;}
.empty-txt{font-size:13px;line-height:1.8;letter-spacing:0.3px;}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;padding:10px 0 24px;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;font-family:var(--sans);
  font-size:10px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;padding:4px 0;transition:color .15s;
}
.nb .ni{font-size:18px;}
.nb.on{color:var(--text);font-weight:600;}

.hidden{display:none!important;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:0 24px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-name">BUDGET</div>
    <div class="hdr-sub">Personal Finance</div>
  </div>
  <div class="hdr-controls">
    <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-lbl" id="monthLabel"></span>
    <button class="icon-btn" onclick="changeMonth(1)">›</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- BALANCE HERO -->
<div class="hero">
  <div class="hero-label">Net Balance</div>
  <div class="hero-balance" id="heroBalance">฿0</div>
  <div class="hero-stats">
    <div class="hstat">
      <div class="hstat-lbl">Income</div>
      <div class="hstat-val g" id="totInc">฿0</div>
    </div>
    <div class="hstat" style="padding-left:16px;">
      <div class="hstat-lbl">Spent</div>
      <div class="hstat-val r" id="totExp">฿0</div>
    </div>
    <div class="hstat" style="padding-left:16px;">
      <div class="hstat-lbl">Entries</div>
      <div class="hstat-val" id="totCount">0</div>
    </div>
  </div>
</div>

<!-- HOME VIEW -->
<div id="homeView">
  <div class="form-wrap">
    <div class="type-toggle">
      <button class="tpill ai" id="btnIn" onclick="setType('income')">+ Income</button>
      <button class="tpill" id="btnEx" onclick="setType('expense')">− Expense</button>
    </div>
    <div class="form-row">
      <span class="form-row-label">Date</span>
      <input class="date-inp" type="date" id="dateInp">
    </div>
    <div class="inputs-row">
      <input class="amt-inp" id="amtInp" type="number" inputmode="decimal" placeholder="Amount ฿">
      <div class="inp-divider"></div>
      <input class="note-inp" id="noteInp" type="text" placeholder="Note / Description">
    </div>
    <div class="cats" id="catRow"></div>
    <button class="add-btn" onclick="addTx()">ADD ENTRY</button>
  </div>
  <div class="sec-title">Transactions</div>
  <div class="list-wrap" id="txWrap"></div>
</div>

<!-- WEEKLY VIEW -->
<div id="weekView" class="hidden">
  <div class="sec-title">Weekly Summary</div>
  <div class="week-wrap" id="weekWrap"></div>
</div>

<!-- MONTHLY VIEW -->
<div id="monthView" class="hidden">
  <div class="sec-title">Monthly Overview</div>
  <div class="month-wrap" id="monthWrap"></div>
</div>

<!-- SHARE VIEW -->
<div id="shareView" class="hidden">
  <div class="share-wrap">
    <div class="share-block">
      <div class="share-ttl">Export Report</div>
      <div class="share-sub">Generate this month's income & expense summary to share or analyze.</div>
      <button class="sbtn prime" onclick="genReport()">Generate Report</button>
      <button class="sbtn" onclick="copyReport()">Copy to Clipboard</button>
      <button class="sbtn" onclick="genAIPrompt()">Analyze with Claude AI</button>
      <div class="share-out" id="shareOut"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="modalTtl"></div>
      <div class="modal-hd-r">
        <div class="modal-tot" id="modalTot"></div>
        <button class="modal-x" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="nb on" id="navHome" onclick="showView('home')"><span class="ni">⌂</span><span>Home</span></button>
  <button class="nb" id="navWeek" onclick="showView('week')"><span class="ni">◫</span><span>Weekly</span></button>
  <button class="nb" id="navMonth" onclick="showView('month')"><span class="ni">◈</span><span>Monthly</span></button>
  <button class="nb" id="navShare" onclick="showView('share')"><span class="ni">↑</span><span>Export</span></button>
</div>

<script>
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_TH=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

const CATS={
  income:[
    {id:'salary',icon:'💼',label:'Salary'},
    {id:'work',  icon:'💰',label:'Work'},
    {id:'free',  icon:'💻',label:'Freelance'},
    {id:'bonus', icon:'🎁',label:'Bonus'},
    {id:'invest',icon:'📈',label:'Investment'},
    {id:'other', icon:'·',label:'Other'},
  ],
  expense:[
    {id:'food',  icon:'🍜',label:'Food'},
    {id:'gas',   icon:'⛽',label:'Fuel'},
    {id:'711',   icon:'🏪',label:'7-Eleven'},
    {id:'tea',   icon:'🧋',label:'Drinks'},
    {id:'trans', icon:'🚌',label:'Transport'},
    {id:'shop',  icon:'🛍',label:'Shopping'},
    {id:'health',icon:'💊',label:'Health'},
    {id:'util',  icon:'💡',label:'Utilities'},
    {id:'enter', icon:'🎮',label:'Entertainment'},
    {id:'other', icon:'·',label:'Other'},
  ]
};

let curType='income',selCat='salary';
let now=new Date(),vMonth=now.getMonth(),vYear=now.getFullYear();
let reportText='';

// THEME
function initTheme(){
  const s=localStorage.getItem('theme')||'light';
  document.documentElement.setAttribute('data-theme',s);
  document.getElementById('themeBtn').textContent=s==='dark'?'☀️':'🌙';
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('theme',n);
  document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';
}

// MIGRATE DATA
function migrateData(){
  const KEY='bgt_v4';
  let ex=JSON.parse(localStorage.getItem(KEY)||'[]');
  const ids=new Set(ex.map(t=>t.id));
  ['bgt_v3','txv2','txData'].forEach(k=>{
    JSON.parse(localStorage.getItem(k)||'[]').forEach(t=>{
      if(!ids.has(t.id)){
        ex.push({id:t.id,type:t.type,amount:t.amount,note:t.note||t.catLabel||'',cat:t.cat||t.category||'other',catLabel:t.catLabel||t.note||'',catIcon:t.catIcon||'·',dk:t.dk||t.dateKey||(t.date?t.date.slice(0,10):todayStr()),ts:t.ts||t.timeStr||''});
        ids.add(t.id);
      }
    });
  });
  ex.sort((a,b)=>b.id-a.id);
  localStorage.setItem(KEY,JSON.stringify(ex));
  return ex;
}
let txs=migrateData();

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
document.getElementById('dateInp').value=todayStr();
function save(){localStorage.setItem('bgt_v4',JSON.stringify(txs));}
function fmt(n){return '฿'+Math.abs(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});}
function getMonthTxs(){return txs.filter(t=>{const[y,m]=t.dk.split('-').map(Number);return m-1===vMonth&&y===vYear;});}

// CATS
function setType(type){
  curType=type;
  document.getElementById('btnIn').className='tpill'+(type==='income'?' ai':'');
  document.getElementById('btnEx').className='tpill'+(type==='expense'?' ae':'');
  renderCats();
}
function renderCats(){
  const list=CATS[curType];selCat=list[0].id;
  document.getElementById('catRow').innerHTML=list.map(c=>
    `<button class="chip${c.id===selCat?' on':''}" onclick="pickCat('${c.id}',this)">${c.icon} ${c.label}</button>`
  ).join('');
}
function pickCat(id,el){selCat=id;document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));el.classList.add('on');}

// ADD / DELETE
function addTx(){
  const amt=parseFloat(document.getElementById('amtInp').value);
  const note=document.getElementById('noteInp').value.trim();
  const dk=document.getElementById('dateInp').value;
  if(!amt||amt<=0){document.getElementById('amtInp').focus();return;}
  if(!dk){document.getElementById('dateInp').focus();return;}
  const cat=CATS[curType].find(c=>c.id===selCat);
  const n=new Date();
  const ts=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  txs.unshift({id:Date.now(),type:curType,amount:amt,note:note||cat.label,cat:selCat,catLabel:cat.label,catIcon:cat.icon,dk,ts});
  save();
  document.getElementById('amtInp').value='';
  document.getElementById('noteInp').value='';
  render();
}
function delTx(id){txs=txs.filter(t=>t.id!==id);save();render();}

// RENDER
function render(){
  document.getElementById('monthLabel').textContent=MONTHS_SHORT[vMonth]+' '+vYear;
  const list=getMonthTxs();
  const inc=list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById('totInc').textContent=fmt(inc);
  document.getElementById('totExp').textContent=fmt(exp);
  document.getElementById('totCount').textContent=list.length;
  const hb=document.getElementById('heroBalance');
  hb.textContent=(bal<0?'−':'')+fmt(bal);
  hb.className='hero-balance '+(bal>0?'pos':bal<0?'neg':'');
  renderList(list);renderWeekly(list);renderMonthly(list);
}

// DAILY LIST
function renderList(list){
  const wrap=document.getElementById('txWrap');
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-ico">○</div><div class="empty-txt">No entries this month.<br>Add your first transaction above.</div></div>`;return;}
  const groups={};
  list.forEach(t=>{if(!groups[t.dk])groups[t.dk]=[];groups[t.dk].push(t);});
  const td=todayStr();
  const yd=new Date();yd.setDate(yd.getDate()-1);
  const ydStr=yd.getFullYear()+'-'+String(yd.getMonth()+1).padStart(2,'0')+'-'+String(yd.getDate()).padStart(2,'0');
  wrap.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(dk=>{
    const items=groups[dk];
    const[y,m,d]=dk.split('-').map(Number);
    const dObj=new Date(y,m-1,d);
    const dName=dk===td?'Today':dk===ydStr?'Yesterday':DAYS_EN[dObj.getDay()];
    const dayInc=items.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const dayExp=items.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const net=dayInc-dayExp;
    const rows=items.map(t=>`
      <div class="tx-row">
        <div class="tx-dot ${t.type==='income'?'g':'r'}"></div>
        <div class="tx-ico">${t.catIcon}</div>
        <div class="tx-mid">
          <div class="tx-note">${t.note}</div>
          <div class="tx-cat">${t.catLabel.toUpperCase()}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amt ${t.type==='income'?'g':'r'}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
          <div class="tx-time">${t.ts||''}</div>
        </div>
        <button class="tx-del" onclick="delTx(${t.id})">✕</button>
      </div>`).join('');
    return `<div class="day-group">
      <div class="day-hd">
        <div>
          <span class="day-date">${d}</span>
          <span class="day-meta"> ${dName} · ${MONTHS_SHORT[m-1]} ${y}</span>
        </div>
        <span class="day-net ${net>=0?'g':'r'}">${net>=0?'+':'−'}${fmt(net)}</span>
      </div>
      <div class="tx-items">${rows}</div>
    </div>`;
  }).join('');
}

// WEEKLY
function getWeekNum(dk){
  const[y,m,d]=dk.split('-').map(Number);
  const date=new Date(y,m-1,d);
  const first=new Date(vYear,vMonth,1);
  return Math.floor((Math.floor((date-first)/86400000)+first.getDay())/7)+1;
}
function renderWeekly(list){
  const wrap=document.getElementById('weekWrap');
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-ico">○</div><div class="empty-txt">No entries this month.</div></div>`;return;}
  const weeks={};
  list.forEach(t=>{const wk=getWeekNum(t.dk);if(!weeks[wk])weeks[wk]={items:[],dates:[]};weeks[wk].items.push(t);if(!weeks[wk].dates.includes(t.dk))weeks[wk].dates.push(t.dk);});
  wrap.innerHTML=Object.keys(weeks).sort((a,b)=>b-a).map(wk=>{
    const w=weeks[wk];
    const inc=w.items.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp=w.items.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const net=inc-exp;
    const dates=w.dates.sort();
    const[,fm,fd]=dates[0].split('-').map(Number);
    const[,lm,ld]=dates[dates.length-1].split('-').map(Number);
    const range=fd+' '+MONTHS_SHORT[fm-1]+(fm!==lm?' – '+ld+' '+MONTHS_SHORT[lm-1]:' – '+ld);
    const bycat={};
    w.items.filter(t=>t.type==='expense').forEach(t=>{if(!bycat[t.cat])bycat[t.cat]={label:t.catLabel,icon:t.catIcon,total:0};bycat[t.cat].total+=t.amount;});
    const top=Object.values(bycat).sort((a,b)=>b.total-a.total).slice(0,3);
    return `<div class="week-block">
      <div class="week-hd">
        <div class="week-hd-lbl">Week ${wk} · ${range}</div>
        <div class="week-hd-net ${net>=0?'g':'r'}">${net>=0?'+':'−'}${fmt(net)}</div>
      </div>
      <div class="week-stats">
        <div class="wstat"><div class="wstat-lbl">Income</div><div class="wstat-val g">${fmt(inc)}</div></div>
        <div class="wstat"><div class="wstat-lbl">Spent</div><div class="wstat-val r">${fmt(exp)}</div></div>
        <div class="wstat"><div class="wstat-lbl">Entries</div><div class="wstat-val">${w.items.length}</div></div>
      </div>
      ${top.length?`<div class="week-cats">${top.map(c=>`<div class="wcat-row"><span class="wcat-name">${c.icon} ${c.label}</span><span class="wcat-amt">−${fmt(c.total)}</span></div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

// MONTHLY
function renderMonthly(list){
  const wrap=document.getElementById('monthWrap');
  const inc=list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  function byCat(type){
    const map={};
    list.filter(t=>t.type===type).forEach(t=>{if(!map[t.cat])map[t.cat]={label:t.catLabel,icon:t.catIcon,total:0,items:[]};map[t.cat].total+=t.amount;map[t.cat].items.push(t);});
    return Object.values(map).sort((a,b)=>b.total-a.total);
  }
  const expCats=byCat('expense'),incCats=byCat('income');
  window._catData={};
  [...expCats,...incCats].forEach(c=>{window._catData[c.label]=c;});
  function rows(cats,total,type){
    const cls=type==='expense'?'r':'g',sign=type==='expense'?'−':'+';
    return cats.map(c=>{
      const pct=total>0?(c.total/total*100):0;
      return`<div class="mrow" onclick="openModal('${c.label.replace(/'/g,"\\'")}')">
        <div class="mrow-ico">${c.icon}</div>
        <div class="mrow-mid">
          <div class="mrow-name">${c.label}</div>
          <div class="mrow-bar"><div class="mrow-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="mrow-hint">TAP FOR DETAILS</div>
        </div>
        <div class="mrow-right">
          <div class="mrow-amt ${cls}">${sign}${fmt(c.total)}</div>
          <div class="mrow-pct">${pct.toFixed(0)}%</div>
        </div>
      </div>`;
    }).join('');
  }
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-ico">○</div><div class="empty-txt">No entries this month.</div></div>`;return;}
  wrap.innerHTML=`
    <div class="mcard">
      <div class="mrow static"><div class="mrow-ico">↑</div><div class="mrow-mid"><div class="mrow-name">Total Income</div></div><div class="mrow-right"><div class="mrow-amt g">+${fmt(inc)}</div></div></div>
      <div class="mrow static"><div class="mrow-ico">↓</div><div class="mrow-mid"><div class="mrow-name">Total Spent</div></div><div class="mrow-right"><div class="mrow-amt r">−${fmt(exp)}</div></div></div>
      <div class="mrow static"><div class="mrow-ico">${bal>=0?'✓':'!'}</div><div class="mrow-mid"><div class="mrow-name">Net Balance</div></div><div class="mrow-right"><div class="mrow-amt ${bal>=0?'g':'r'}">${bal>=0?'+':'−'}${fmt(bal)}</div></div></div>
    </div>
    ${expCats.length?`<div class="sec-title" style="padding:18px 0 0;">Expense Breakdown</div><div class="mcard">${rows(expCats,exp,'expense')}</div>`:''}
    ${incCats.length?`<div class="sec-title" style="padding:18px 0 0;">Income Breakdown</div><div class="mcard">${rows(incCats,inc,'income')}</div>`:''}
  `;
}

// MODAL
function openModal(label){
  const cat=window._catData[label];if(!cat)return;
  const isExp=cat.items[0]?.type==='expense';
  const cls=isExp?'r':'g',sign=isExp?'−':'+';
  document.getElementById('modalTtl').textContent=cat.icon+' '+cat.label;
  document.getElementById('modalTot').className='modal-tot '+cls;
  document.getElementById('modalTot').textContent=sign+fmt(cat.total);
  const byDay={};
  cat.items.forEach(t=>{if(!byDay[t.dk])byDay[t.dk]=[];byDay[t.dk].push(t);});
  document.getElementById('modalBody').innerHTML=Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).map(dk=>{
    const[y,m,d]=dk.split('-').map(Number);
    const dObj=new Date(y,m-1,d);
    const lbl=DAYS_EN[dObj.getDay()]+', '+d+' '+MONTHS_SHORT[m-1]+' '+y;
    const items=byDay[dk].map(t=>`
      <div class="mitem">
        <div class="mitem-note">${t.note}</div>
        <div class="mitem-r">
          <div class="mitem-amt ${cls}">${sign}${fmt(t.amount)}</div>
          <div class="mitem-time">${t.ts||''}</div>
        </div>
      </div>`).join('');
    return`<div class="mday-group"><div class="mday-lbl">${lbl}</div>${items}</div>`;
  }).join('');
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.add('hidden');document.body.style.overflow='';}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeModal();}

// SHARE
function genReport(){
  const list=getMonthTxs();
  const inc=list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  const bycat={};
  list.filter(t=>t.type==='expense').forEach(t=>{if(!bycat[t.cat])bycat[t.cat]={label:t.catLabel,total:0};bycat[t.cat].total+=t.amount;});
  const lines=Object.values(bycat).sort((a,b)=>b.total-a.total).map(c=>`  • ${c.label}: ${fmt(c.total)}`).join('\n');
  reportText=`BUDGET REPORT — ${MONTHS_EN[vMonth]} ${vYear}\n${'─'.repeat(32)}\nIncome : ${fmt(inc)}\nSpent  : ${fmt(exp)}\nBalance: ${bal>=0?'+':'−'}${fmt(Math.abs(bal))}\n\nExpense Breakdown:\n${lines||'  (none)'}\n\nTotal entries: ${list.length}`;
  const out=document.getElementById('shareOut');out.textContent=reportText;out.style.display='block';
}
function copyReport(){if(!reportText)genReport();navigator.clipboard?navigator.clipboard.writeText(reportText).then(()=>alert('Copied!')):fallback(reportText);}
function genAIPrompt(){if(!reportText)genReport();const p=reportText+'\n\nPlease analyze my income and expenses. What should I cut back on? Any advice for better financial management?';navigator.clipboard?navigator.clipboard.writeText(p).then(()=>alert('Prompt copied! Paste into Claude.')):fallback(p);}
function fallback(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Copied!');}

function changeMonth(dir){vMonth+=dir;if(vMonth>11){vMonth=0;vYear++;}if(vMonth<0){vMonth=11;vYear--;}render();}
function showView(v){
  ['home','week','month','share'].forEach(x=>{
    document.getElementById(x+'View').classList.toggle('hidden',x!==v);
    document.getElementById('nav'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('on',x===v);
  });
}

initTheme();renderCats();render();
</script>
